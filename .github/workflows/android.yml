name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        
    - name: Ensure minimal structure
      run: |
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        
        # Create minimal AndroidManifest.xml
        cat <<EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.lumina.sunchaser">
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="Lumina"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/Theme.Lumina">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:theme="@style/Theme.Lumina">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # Create minimal MainActivity.kt
        cat <<EOF > app/src/main/java/com/lumina/sunchaser/MainActivity.kt
        package com.lumina.sunchaser
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import com.lumina.sunchaser.presentation.main.MainScreen
        import com.lumina.sunchaser.presentation.main.MainViewModel
        import com.lumina.sunchaser.domain.usecase.CalculateRatingUseCase
        import com.lumina.sunchaser.domain.usecase.GetAiRecommendationUseCase
        import com.lumina.sunchaser.domain.repository.WeatherRepository
        import com.lumina.sunchaser.data.remote.OpenMeteoService
        import com.lumina.sunchaser.data.repository.WeatherRepositoryImpl
        import retrofit2.Retrofit
        import retrofit2.converter.gson.GsonConverterFactory

        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                // Manual DI since we haven't fully wired Hilt application class
                val api = Retrofit.Builder()
                    .baseUrl(OpenMeteoService.BASE_URL)
                    .addConverterFactory(GsonConverterFactory.create())
                    .build()
                    .create(OpenMeteoService::class.java)
                val repo = WeatherRepositoryImpl(api)
                val calc = CalculateRatingUseCase()
                
                // For OnlySQ we need an empty stub or null service for the prototype if we don't have a key
                val onlySqApi = Retrofit.Builder()
                    .baseUrl(com.lumina.sunchaser.data.remote.OnlySqService.BASE_URL)
                    .addConverterFactory(GsonConverterFactory.create())
                    .build()
                    .create(com.lumina.sunchaser.data.remote.OnlySqService::class.java)
                
                val aiUse = GetAiRecommendationUseCase(onlySqApi)
                
                val viewModel = MainViewModel(repo, calc, aiUse)
                
                setContent {
                    MainScreen(viewModel)
                }
            }
        }
        EOF
        
        # Add basic theme and icon so build doesn't fail
        cat <<EOF > app/src/main/res/values/themes.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.Lumina" parent="android:Theme.Material.Light.NoActionBar" />
        </resources>
        EOF
        
        cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/white"/>
            <foreground android:drawable="@android:color/black"/>
        </adaptive-icon>
        EOF
        
        cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/white"/>
            <foreground android:drawable="@android:color/black"/>
        </adaptive-icon>
        EOF

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lumina-app
        path: app/build/outputs/apk/debug/app-debug.apk
